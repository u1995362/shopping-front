name: Build and deploy Angular app to Azure Web App - Shopping-list-front

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.16'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        run: |
          cp package.json dist/llista-compra/browser/
          cp package-lock.json dist/llista-compra/browser/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: dist/llista-compra/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: angular-app
          path: app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8DDA998DF4C44249A9D6177E3E4C547E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D429E5B9F5DD4B0C92CC77DD97921A29 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6CF008C4F81B442688B233FAC9FD5F12 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Shopping-list-front'
          slot-name: 'Production'
          package: app
          startup-command: 'npm install --omit=dev && npx serve -s . -l tcp://0.0.0.0:${PORT:-8080}'